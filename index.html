<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード強度チェッカー</title>
  <style>
    :root {
      --bg: #e9eef6;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --border: rgba(27, 42, 74, 0.14);
      --text: #1B2A4A;
      --text-muted: #5a6b88;
      --accent: #3d6fd9;
      --danger: #c62828;
      --warn: #ef6c00;
      --radius: 16px;
      --shadow: 0 10px 36px rgba(27, 42, 74, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body.modal-open {
      overflow: hidden;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(91, 140, 255, 0.22), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(27, 42, 74, 0.06), transparent);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 2.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.25rem;
      animation: fadeDown 0.6s ease-out;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      margin-bottom: 0.5rem;
    }

    .brand svg {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 4px 14px rgba(61, 111, 217, 0.25));
    }

    h1 {
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.85rem;
      padding: 0.25rem;
      background: rgba(27, 42, 74, 0.06);
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 0.65rem 0.5rem;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn[aria-selected="true"] {
      background: var(--bg-card);
      color: var(--text);
      box-shadow: 0 2px 10px rgba(27, 42, 74, 0.08);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      animation: cardIn 0.55s ease-out 0.1s both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .tab-panel[hidden] {
      display: none !important;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .field-label .key-icon {
      width: 18px;
      height: 18px;
      opacity: 0.85;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="password"],
    input[type="text"],
    input[type="search"],
    textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(61, 111, 217, 0.65);
      box-shadow: 0 0 0 3px rgba(61, 111, 217, 0.18);
      animation: inputPulse 0.35s ease;
    }

    @keyframes inputPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    .btn-toggle {
      flex-shrink: 0;
      padding: 0 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(27, 42, 74, 0.06);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-toggle:hover {
      background: rgba(27, 42, 74, 0.1);
    }

    .btn-toggle:active {
      transform: scale(0.97);
    }

    .meter-section {
      margin-top: 1.25rem;
    }

    .meter-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }

    .meter-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    #strengthText {
      font-weight: 700;
      font-size: 0.95rem;
      transition: color 0.35s ease;
    }

    .meter-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(27, 42, 74, 0.1);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.45s cubic-bezier(0.34, 1.2, 0.64, 1), background 0.35s ease, box-shadow 0.35s ease;
      box-shadow: 0 2px 12px rgba(27, 42, 74, 0.12);
    }

    .check-section {
      margin-top: 1.35rem;
    }

    .check-section h2 {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 0.65rem;
    }

    .check-grid {
      display: grid;
      gap: 0.45rem;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.88rem;
      padding: 0.45rem 0.55rem;
      border-radius: 10px;
      background: rgba(27, 42, 74, 0.04);
      border: 1px solid transparent;
      transition: border-color 0.25s, background 0.25s, transform 0.25s ease;
    }

    .check-item.done {
      border-color: rgba(76, 175, 80, 0.35);
      background: rgba(76, 175, 80, 0.08);
      animation: checkPop 0.35s ease;
    }

    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .check-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(27, 42, 74, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }

    .check-item.done .check-icon {
      background: rgba(76, 175, 80, 0.9);
      border-color: #66bb6a;
      color: #fff;
    }

    .advice-section {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .advice-section h2 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .advice-list {
      list-style: none;
      font-size: 0.88rem;
      color: #b45309;
    }

    .advice-list li {
      padding: 0.25rem 0;
      padding-left: 1rem;
      position: relative;
    }

    .advice-list li::before {
      content: "・";
      position: absolute;
      left: 0;
    }

    .advice-list:empty::after {
      content: "すべての推奨項目を満たしています。お疲れさまです。";
      color: #2e7d32;
      display: block;
      padding-left: 0;
    }

    .warn-box {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: rgba(198, 40, 40, 0.1);
      border: 1px solid rgba(198, 40, 40, 0.35);
      color: #8b1a1a;
      font-size: 0.88rem;
      display: none;
      animation: shake 0.4s ease;
    }

    .warn-box.show {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .gen-row {
      margin-top: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .btn-gen {
      flex: 1;
      min-width: 160px;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3d6fd9, #2f8fef);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(61, 111, 217, 0.35);
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .btn-gen:hover {
      box-shadow: 0 6px 22px rgba(61, 111, 217, 0.42);
    }

    .btn-gen:active {
      transform: scale(0.98);
    }

    .btn-copy {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(27, 42, 74, 0.06);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy:hover {
      background: rgba(27, 42, 74, 0.1);
    }

    .btn-copy:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .save-row {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .btn-save {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px dashed rgba(61, 111, 217, 0.45);
      background: rgba(61, 111, 217, 0.08);
      color: var(--accent);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-save:hover:not(:disabled) {
      background: rgba(61, 111, 217, 0.14);
      border-color: rgba(61, 111, 217, 0.65);
    }

    .btn-save:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .generated-hint {
      width: 100%;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }

    .saved-toolbar {
      margin-bottom: 1rem;
    }

    .saved-toolbar input[type="search"] {
      font-size: 0.95rem;
    }

    .saved-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .saved-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      background: rgba(27, 42, 74, 0.03);
      animation: cardIn 0.35s ease both;
    }

    .saved-card-top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.65rem;
    }

    .saved-card-title {
      font-weight: 700;
      font-size: 1rem;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .saved-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
    }

    .saved-pwd-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .saved-pwd-val {
      flex: 1;
      min-width: 0;
      font-family: ui-monospace, monospace;
      font-size: 0.88rem;
      padding: 0.5rem 0.65rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      word-break: break-all;
    }

    .saved-pwd-val.masked {
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }

    .saved-memo {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 0.5rem 0.65rem;
      background: rgba(27, 42, 74, 0.04);
      border-radius: 10px;
      margin-bottom: 0.65rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .saved-memo:empty {
      display: none;
    }

    .saved-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .btn-small {
      padding: 0.45rem 0.65rem;
      font-size: 0.78rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(27, 42, 74, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-small:hover {
      background: rgba(27, 42, 74, 0.1);
    }

    .btn-small.danger {
      border-color: rgba(198, 40, 40, 0.4);
      color: var(--danger);
      background: rgba(198, 40, 40, 0.06);
    }

    .btn-small.danger:hover {
      background: rgba(198, 40, 40, 0.12);
    }

    .saved-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 2rem 0.5rem;
    }

    .saved-empty[hidden] {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(27, 42, 74, 0.45);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-backdrop[hidden] {
      display: none !important;
    }

    .modal-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    @media (min-width: 480px) {
      .modal-backdrop {
        align-items: center;
      }
    }

    .modal {
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      transform: translateY(16px);
      transition: transform 0.3s ease;
    }

    .modal-backdrop.show .modal {
      transform: translateY(0);
    }

    .modal h2 {
      font-size: 1.05rem;
      margin-bottom: 1rem;
    }

    .modal-field {
      margin-bottom: 0.85rem;
    }

    .modal-field label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .modal-field .req {
      color: var(--danger);
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.1rem;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(27, 42, 74, 0.06);
      color: var(--text);
    }

    .modal-actions .btn-primary {
      border: none;
      background: linear-gradient(135deg, #3d6fd9, #2f8fef);
      color: #fff;
      font-weight: 600;
    }

    footer.notice {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.75;
      padding: 0 0.5rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #ffffff;
      color: var(--text);
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.35s ease, opacity 0.35s ease;
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 400px) {
      .input-row {
        flex-direction: column;
      }
      .btn-toggle {
        width: 100%;
      }
      .saved-pwd-row .btn-small {
        flex: 1;
        min-width: calc(50% - 0.25rem);
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <div class="brand" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 4L8 12v12c0 10 6.5 18.5 16 22 9.5-3.5 16-12 16-22V12L24 4z" stroke="#3d6fd9" stroke-width="2.5" fill="rgba(61,111,217,0.12)"/>
          <path d="M24 22v8M20 26h8" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
          <path d="M14 22V14a10 10 0 1120 0v8" stroke="#5a6b88" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="10" y="22" width="28" height="20" rx="4" stroke="#3d6fd9" stroke-width="2" fill="rgba(61,111,217,0.08)"/>
          <circle cx="24" cy="32" r="2.5" fill="#1B2A4A"/>
        </svg>
      </div>
      <h1>パスワード強度チェッカー</h1>
      <p class="subtitle">入力するだけで強度と改善アドバイスがわかります（小規模事業者向け）</p>
    </header>

    <div class="tabs" role="tablist" aria-label="画面切り替え">
      <button type="button" class="tab-btn" role="tab" id="tabDiagnose" aria-selected="true" aria-controls="panelDiagnose">診断</button>
      <button type="button" class="tab-btn" role="tab" id="tabSaved" aria-selected="false" aria-controls="panelSaved">保存済み一覧</button>
    </div>

    <main class="card tab-panel" id="panelDiagnose" role="tabpanel" aria-labelledby="tabDiagnose">
      <label class="field-label" for="pwd">
        <svg class="key-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 11V7a5 5 0 0110 0v4M5 11h14v10a2 2 0 01-2 2H7a2 2 0 01-2-2V11z" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        パスワード
      </label>
      <div class="input-row">
        <div class="input-wrap">
          <input type="password" id="pwd" autocomplete="off" spellcheck="false" placeholder="ここに入力" />
        </div>
        <button type="button" class="btn-toggle" id="toggleVis" aria-pressed="false">表示</button>
      </div>

      <div class="meter-section">
        <div class="meter-head">
          <span class="meter-label">強度</span>
          <span id="strengthText">—</span>
        </div>
        <div class="meter-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="meterBar">
          <div class="meter-fill" id="meterFill"></div>
        </div>
      </div>

      <div id="warnBox" class="warn-box" role="alert"></div>

      <section class="check-section" aria-label="チェック項目">
        <h2>チェック項目</h2>
        <div class="check-grid" id="checkGrid"></div>
      </section>

      <section class="advice-section" aria-label="改善アドバイス">
        <h2>改善アドバイス</h2>
        <ul class="advice-list" id="adviceList"></ul>
      </section>

      <div class="gen-row">
        <button type="button" class="btn-gen" id="btnGen">安全なパスワードを生成する</button>
        <button type="button" class="btn-copy" id="btnCopy" disabled>コピー</button>
        <span class="generated-hint" id="genHint"></span>
      </div>

      <div class="save-row">
        <button type="button" class="btn-save" id="btnSavePwd" disabled>このパスワードを保存する</button>
      </div>
    </main>

    <section class="card tab-panel" id="panelSaved" role="tabpanel" aria-labelledby="tabSaved" hidden>
      <div class="saved-toolbar">
        <label class="field-label" for="savedSearch">検索</label>
        <input type="search" id="savedSearch" placeholder="ラベル名で検索（例：Instagram）" autocomplete="off" />
      </div>
      <div id="savedList" class="saved-list" aria-live="polite"></div>
      <p class="saved-empty" id="savedEmpty">保存されたパスワードはまだありません。診断タブから保存できます。</p>
    </section>

    <footer class="notice">
      <p>入力したパスワードはどこにも送信されません。</p>
      <p>このツールはブラウザ内のみで動作します。</p>
      <p>保存したパスワードはこのブラウザ内にのみ保存されます。</p>
      <p>外部サーバーには一切送信されません。</p>
      <p>ブラウザのキャッシュを削除すると消えます。</p>
    </footer>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden role="presentation">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" id="modalBox">
      <h2 id="modalTitle">パスワードを保存</h2>
      <div id="modalLabelBlock" class="modal-field">
        <label for="modalLabel">ラベル名 <span class="req" id="modalLabelReq">*</span></label>
        <input type="text" id="modalLabel" placeholder="例：Instagram、銀行口座、WiFi" autocomplete="off" />
      </div>
      <div id="modalMemoBlock" class="modal-field">
        <label for="modalMemo">メモ（任意）</label>
        <textarea id="modalMemo" placeholder="用途や注意事項など"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" id="modalCancel">キャンセル</button>
        <button type="button" class="btn-primary" id="modalConfirm">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status">コピーしました</div>

  <script>
    (function () {
      var LS_KEY = "passwordChecker_saved_v1";

      var pwd = document.getElementById("pwd");
      var toggleVis = document.getElementById("toggleVis");
      var strengthText = document.getElementById("strengthText");
      var meterFill = document.getElementById("meterFill");
      var meterBar = document.getElementById("meterBar");
      var checkGrid = document.getElementById("checkGrid");
      var adviceList = document.getElementById("adviceList");
      var warnBox = document.getElementById("warnBox");
      var btnGen = document.getElementById("btnGen");
      var btnCopy = document.getElementById("btnCopy");
      var btnSavePwd = document.getElementById("btnSavePwd");
      var genHint = document.getElementById("genHint");
      var toast = document.getElementById("toast");

      var tabDiagnose = document.getElementById("tabDiagnose");
      var tabSaved = document.getElementById("tabSaved");
      var panelDiagnose = document.getElementById("panelDiagnose");
      var panelSaved = document.getElementById("panelSaved");
      var savedSearch = document.getElementById("savedSearch");
      var savedList = document.getElementById("savedList");
      var savedEmpty = document.getElementById("savedEmpty");

      var modalBackdrop = document.getElementById("modalBackdrop");
      var modalTitle = document.getElementById("modalTitle");
      var modalLabelBlock = document.getElementById("modalLabelBlock");
      var modalMemoBlock = document.getElementById("modalMemoBlock");
      var modalLabelReq = document.getElementById("modalLabelReq");
      var modalLabel = document.getElementById("modalLabel");
      var modalMemo = document.getElementById("modalMemo");
      var modalCancel = document.getElementById("modalCancel");
      var modalConfirm = document.getElementById("modalConfirm");

      var modalMode = "save";
      var editingId = null;

      var LEVELS = [
        { key: "weakest", label: "最弱", pct: 20, color: "#e53935", glow: "rgba(229,57,53,0.5)" },
        { key: "weak", label: "弱い", pct: 40, color: "#ff9800", glow: "rgba(255,152,0,0.45)" },
        { key: "normal", label: "普通", pct: 60, color: "#e6ac00", glow: "rgba(230,172,0,0.35)" },
        { key: "strong", label: "強い", pct: 80, color: "#4dd0e1", glow: "rgba(77,208,225,0.45)" },
        { key: "strongest", label: "最強", pct: 100, color: "#66bb6a", glow: "rgba(102,187,106,0.5)" }
      ];

      var CHECK_DEFS = [
        { id: "len8", label: "8文字以上", test: function (s) { return s.length >= 8; } },
        { id: "len12", label: "12文字以上", test: function (s) { return s.length >= 12; } },
        { id: "upper", label: "大文字を含む", test: function (s) { return /[A-Z]/.test(s); } },
        { id: "lower", label: "小文字を含む", test: function (s) { return /[a-z]/.test(s); } },
        { id: "digit", label: "数字を含む", test: function (s) { return /[0-9]/.test(s); } },
        { id: "symbol", label: "記号を含む（!@#$% など）", test: function (s) { return /[^A-Za-z0-9]/.test(s); } }
      ];

      var WEAK_EXACT = ["123456", "password", "111111", "12345678", "qwerty", "admin", "password1", "000000"];
      var WEAK_WORDS = [
        "password", "passw0rd", "admin", "welcome", "guest", "login", "cafe", "coffee", "restaurant",
        "shop", "store", "company", "office", "tanaka", "yamada", "suzuki", "sato",
        "パスワード", "てんぽ", "みせ", "かいしゃ", "きぎょう", "れすとらん", "かふぇ"
      ];

      var adviceMap = {
        len8: "8文字以上にすると、推奨ラインに近づきます。",
        len12: "12文字以上にすると、より強い判定になりやすくなります。",
        upper: "大文字（A〜Z）を混ぜると推測されにくくなります。",
        lower: "小文字（a〜z）を混ぜると推測されにくくなります。",
        digit: "数字を追加するとより安全になります。",
        symbol: "記号（!@#$% など）を入れると強度が大きく上がります。"
      };

      var generatedPassword = "";

      function hasLetter(s) {
        return /[A-Za-z]/.test(s);
      }
      function hasDigit(s) {
        return /[0-9]/.test(s);
      }
      function hasSymbol(s) {
        return /[^A-Za-z0-9]/.test(s);
      }

      function computeStrength(s) {
        if (!s || s.length < 8) {
          return LEVELS[0];
        }
        var letter = hasLetter(s);
        var digit = hasDigit(s);
        var sym = hasSymbol(s);
        if (!letter || !digit) {
          return LEVELS[1];
        }
        if (!sym) {
          return LEVELS[2];
        }
        if (s.length >= 12) {
          return LEVELS[4];
        }
        return LEVELS[3];
      }

      function looksLikeBirthdate(s) {
        if (!/^\d{8}$/.test(s)) return false;
        var y = parseInt(s.slice(0, 4), 10);
        var m = parseInt(s.slice(4, 6), 10);
        var d = parseInt(s.slice(6, 8), 10);
        if (y < 1920 || y > 2030) return false;
        if (m < 1 || m > 12) return false;
        if (d < 1 || d > 31) return false;
        return true;
      }

      function isDangerousPassword(s) {
        if (!s) return { danger: false, msg: "" };
        var lower = s.toLowerCase();
        for (var i = 0; i < WEAK_EXACT.length; i++) {
          if (lower === WEAK_EXACT[i]) {
            return { danger: true, msg: "よく使われる危険なパスワードです。別のものに変えましょう。" };
          }
        }
        if (lower.indexOf("password") !== -1 || lower === "pass" || lower === "pass1234") {
          return { danger: true, msg: "「password」などの単語を含むパスワードは非常に危険です。" };
        }
        if (looksLikeBirthdate(s)) {
          return { danger: true, msg: "生年月日のような並びは推測されやすいです。使わないでください。" };
        }
        if (s.length <= 20 && /^[a-zA-Z\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]+$/.test(s)) {
          for (var j = 0; j < WEAK_WORDS.length; j++) {
            if (lower === WEAK_WORDS[j] || lower.indexOf(WEAK_WORDS[j]) !== -1) {
              return { danger: true, msg: "店名・会社名・単純な単語だけのパスワードは危険です。数字と記号を混ぜましょう。" };
            }
          }
        }
        if (s.length >= 4 && s.length <= 16 && /^[a-zA-Z]+$/.test(s)) {
          var simple = lower;
          if (simple.length <= 10 && /^(cafe|shop|store|admin|login|welcome|tanaka|yamada)$/.test(simple)) {
            return { danger: true, msg: "単純な英単語のみのパスワードは避けましょう。" };
          }
        }
        return { danger: false, msg: "" };
      }

      function buildChecks() {
        checkGrid.innerHTML = "";
        CHECK_DEFS.forEach(function (def) {
          var div = document.createElement("div");
          div.className = "check-item";
          div.dataset.id = def.id;
          div.innerHTML =
            '<span class="check-icon" aria-hidden="true"></span><span>' + def.label + "</span>";
          checkGrid.appendChild(div);
        });
      }

      function updateUI() {
        var s = pwd.value;
        var level = computeStrength(s);
        strengthText.textContent = s ? level.label : "—";
        strengthText.style.color = s ? level.color : "var(--text-muted)";
        meterFill.style.width = s ? level.pct + "%" : "0%";
        meterFill.style.background = s ? level.color : "transparent";
        meterFill.style.boxShadow = s ? "0 0 20px " + level.glow : "none";
        meterBar.setAttribute("aria-valuenow", s ? String(level.pct) : "0");

        CHECK_DEFS.forEach(function (def) {
          var el = checkGrid.querySelector('[data-id="' + def.id + '"]');
          if (!el) return;
          var ok = def.test(s);
          el.classList.toggle("done", ok);
          el.querySelector(".check-icon").textContent = ok ? "✓" : "";
        });

        adviceList.innerHTML = "";
        if (!s) {
          warnBox.classList.remove("show");
          warnBox.textContent = "";
          return;
        }
        CHECK_DEFS.forEach(function (def) {
          if (!def.test(s)) {
            var li = document.createElement("li");
            li.textContent = adviceMap[def.id];
            adviceList.appendChild(li);
          }
        });

        var d = isDangerousPassword(s);
        if (d.danger) {
          warnBox.textContent = d.msg;
          warnBox.classList.add("show");
        } else {
          warnBox.classList.remove("show");
          warnBox.textContent = "";
        }
      }

      function getEntries() {
        try {
          var raw = localStorage.getItem(LS_KEY);
          if (!raw) return [];
          var arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (e) {
          return [];
        }
      }

      function setEntries(arr) {
        localStorage.setItem(LS_KEY, JSON.stringify(arr));
      }

      function newId() {
        return String(Date.now()) + "-" + Math.random().toString(36).slice(2, 10);
      }

      function formatSavedAt(iso) {
        try {
          return new Date(iso).toLocaleString("ja-JP", {
            year: "numeric",
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
        } catch (e) {
          return iso;
        }
      }

      function openModal(mode, entry) {
        modalMode = mode;
        editingId = entry ? entry.id : null;
        modalLabel.value = "";
        modalMemo.value = "";
        modalLabelBlock.style.display = "";
        modalMemoBlock.style.display = "";
        modalLabelReq.style.display = "";

        if (mode === "save") {
          modalTitle.textContent = "パスワードを保存";
          modalConfirm.textContent = "保存";
          modalMemoBlock.style.display = "";
        } else if (mode === "editLabel") {
          modalTitle.textContent = "ラベル名を編集";
          modalConfirm.textContent = "更新";
          modalMemoBlock.style.display = "none";
          modalLabel.value = entry.label || "";
        } else if (mode === "editMemo") {
          modalTitle.textContent = "メモを編集";
          modalConfirm.textContent = "更新";
          modalLabelBlock.style.display = "none";
          modalLabelReq.style.display = "none";
          modalMemo.value = entry.memo || "";
        }

        modalBackdrop.hidden = false;
        requestAnimationFrame(function () {
          modalBackdrop.classList.add("show");
        });
        document.body.classList.add("modal-open");
        setTimeout(function () {
          if (mode === "editMemo") {
            modalMemo.focus();
          } else {
            modalLabel.focus();
          }
        }, 100);
      }

      function closeModal() {
        modalBackdrop.classList.remove("show");
        document.body.classList.remove("modal-open");
        setTimeout(function () {
          modalBackdrop.hidden = true;
        }, 250);
      }

      function onModalConfirm() {
        if (modalMode === "save") {
          var label = modalLabel.value.trim();
          if (!label) {
            showToast("ラベル名を入力してください");
            modalLabel.focus();
            return;
          }
          var pw = pwd.value;
          if (!pw) {
            showToast("パスワードがありません");
            closeModal();
            return;
          }
          var list = getEntries();
          list.unshift({
            id: newId(),
            label: label,
            password: pw,
            memo: modalMemo.value.trim(),
            savedAt: new Date().toISOString()
          });
          setEntries(list);
          showToast("保存しました");
          closeModal();
          renderSavedList();
          switchTab("saved");
          return;
        }
        if (modalMode === "editLabel") {
          var newLabel = modalLabel.value.trim();
          if (!newLabel) {
            showToast("ラベル名を入力してください");
            return;
          }
          var arr = getEntries();
          for (var i = 0; i < arr.length; i++) {
            if (arr[i].id === editingId) {
              arr[i].label = newLabel;
              break;
            }
          }
          setEntries(arr);
          showToast("ラベルを更新しました");
          closeModal();
          renderSavedList();
          return;
        }
        if (modalMode === "editMemo") {
          var arr2 = getEntries();
          for (var j = 0; j < arr2.length; j++) {
            if (arr2[j].id === editingId) {
              arr2[j].memo = modalMemo.value.trim();
              break;
            }
          }
          setEntries(arr2);
          showToast("メモを更新しました");
          closeModal();
          renderSavedList();
        }
      }

      function deleteEntry(id) {
        if (!confirm("この項目を削除しますか？\n削除すると元に戻せません。")) return;
        var arr = getEntries().filter(function (e) {
          return e.id !== id;
        });
        setEntries(arr);
        showToast("削除しました");
        renderSavedList();
      }

      var pwdVisibleMap = {};

      function renderSavedList() {
        var q = (savedSearch.value || "").trim().toLowerCase();
        var all = getEntries();
        var filtered = q
          ? all.filter(function (e) {
              return (e.label || "").toLowerCase().indexOf(q) !== -1;
            })
          : all;

        savedList.innerHTML = "";
        savedEmpty.hidden = all.length > 0;
        if (all.length === 0) {
          return;
        }
        if (filtered.length === 0) {
          var emptyF = document.createElement("p");
          emptyF.className = "saved-empty";
          emptyF.style.padding = "1rem";
          emptyF.textContent = "検索に一致する項目がありません。";
          savedList.appendChild(emptyF);
          return;
        }

        filtered.forEach(function (entry) {
          var level = computeStrength(entry.password || "");
          var card = document.createElement("article");
          card.className = "saved-card";
          card.dataset.entryId = entry.id;

          var top = document.createElement("div");
          top.className = "saved-card-top";
          var title = document.createElement("div");
          title.className = "saved-card-title";
          title.textContent = entry.label || "（無題）";
          var badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = level.label;
          badge.style.background = level.color;
          top.appendChild(title);
          top.appendChild(badge);

          var meta = document.createElement("div");
          meta.className = "saved-meta";
          meta.textContent = "保存日時：" + formatSavedAt(entry.savedAt);

          var pwdRow = document.createElement("div");
          pwdRow.className = "saved-pwd-row";
          var pwdVal = document.createElement("div");
          pwdVal.className = "saved-pwd-val masked";
          pwdVal.textContent = "••••••••";
          var realPw = entry.password || "";

          var btnShow = document.createElement("button");
          btnShow.type = "button";
          btnShow.className = "btn-small";
          btnShow.textContent = "表示";
          var vis = pwdVisibleMap[entry.id];
          if (vis) {
            pwdVal.textContent = realPw;
            pwdVal.classList.remove("masked");
            btnShow.textContent = "非表示";
          }

          btnShow.addEventListener("click", function () {
            var showing = pwdVisibleMap[entry.id];
            if (showing) {
              pwdVisibleMap[entry.id] = false;
              pwdVal.textContent = "••••••••";
              pwdVal.classList.add("masked");
              btnShow.textContent = "表示";
            } else {
              pwdVisibleMap[entry.id] = true;
              pwdVal.textContent = realPw;
              pwdVal.classList.remove("masked");
              btnShow.textContent = "非表示";
            }
          });

          var btnCopySaved = document.createElement("button");
          btnCopySaved.type = "button";
          btnCopySaved.className = "btn-small";
          btnCopySaved.textContent = "コピー";
          btnCopySaved.addEventListener("click", function () {
            copyText(realPw);
          });

          pwdRow.appendChild(pwdVal);
          pwdRow.appendChild(btnShow);
          pwdRow.appendChild(btnCopySaved);

          var memoEl = document.createElement("div");
          memoEl.className = "saved-memo";
          if (entry.memo) {
            memoEl.textContent = entry.memo;
          }

          var actions = document.createElement("div");
          actions.className = "saved-actions";
          var btnEditLabel = document.createElement("button");
          btnEditLabel.type = "button";
          btnEditLabel.className = "btn-small";
          btnEditLabel.textContent = "ラベル編集";
          btnEditLabel.addEventListener("click", function () {
            openModal("editLabel", entry);
          });
          var btnEditMemo = document.createElement("button");
          btnEditMemo.type = "button";
          btnEditMemo.className = "btn-small";
          btnEditMemo.textContent = "メモ編集";
          btnEditMemo.addEventListener("click", function () {
            openModal("editMemo", entry);
          });
          var btnDel = document.createElement("button");
          btnDel.type = "button";
          btnDel.className = "btn-small danger";
          btnDel.textContent = "削除";
          btnDel.addEventListener("click", function () {
            deleteEntry(entry.id);
          });
          actions.appendChild(btnEditLabel);
          actions.appendChild(btnEditMemo);
          actions.appendChild(btnDel);

          card.appendChild(top);
          card.appendChild(meta);
          card.appendChild(pwdRow);
          card.appendChild(memoEl);
          card.appendChild(actions);
          savedList.appendChild(card);
        });
      }

      function switchTab(which) {
        var isDiag = which === "diagnose";
        tabDiagnose.setAttribute("aria-selected", isDiag ? "true" : "false");
        tabSaved.setAttribute("aria-selected", isDiag ? "false" : "true");
        panelDiagnose.hidden = !isDiag;
        panelSaved.hidden = isDiag;
        if (!isDiag) {
          renderSavedList();
        }
      }

      tabDiagnose.addEventListener("click", function () {
        switchTab("diagnose");
      });
      tabSaved.addEventListener("click", function () {
        switchTab("saved");
      });

      savedSearch.addEventListener("input", function () {
        renderSavedList();
      });

      modalCancel.addEventListener("click", closeModal);
      modalConfirm.addEventListener("click", onModalConfirm);
      modalBackdrop.addEventListener("click", function (e) {
        if (e.target === modalBackdrop) closeModal();
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !modalBackdrop.hidden) {
          closeModal();
        }
      });

      btnSavePwd.addEventListener("click", function () {
        if (!pwd.value) return;
        openModal("save", null);
      });

      pwd.addEventListener("input", function () {
        btnCopy.disabled = pwd.value.length === 0;
        btnSavePwd.disabled = pwd.value.length === 0;
        updateUI();
      });
      pwd.addEventListener("focus", function () {
        pwd.style.animation = "none";
        void pwd.offsetWidth;
        pwd.style.animation = "";
      });

      toggleVis.addEventListener("click", function () {
        var hidden = pwd.type === "password";
        pwd.type = hidden ? "text" : "password";
        toggleVis.textContent = hidden ? "非表示" : "表示";
        toggleVis.setAttribute("aria-pressed", hidden ? "true" : "false");
      });

      function randomChar(set) {
        return set[Math.floor(Math.random() * set.length)];
      }

      function generatePassword() {
        var upper = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        var lower = "abcdefghijkmnpqrstuvwxyz";
        var nums = "23456789";
        var syms = "!@#$%&*-_=+?";
        var len = 16;
        var chars = [];
        chars.push(randomChar(upper));
        chars.push(randomChar(lower));
        chars.push(randomChar(nums));
        chars.push(randomChar(syms));
        var all = upper + lower + nums + syms;
        for (var i = chars.length; i < len; i++) {
          chars.push(randomChar(all));
        }
        for (var j = chars.length - 1; j > 0; j--) {
          var k = Math.floor(Math.random() * (j + 1));
          var t = chars[j];
          chars[j] = chars[k];
          chars[k] = t;
        }
        return chars.join("");
      }

      btnGen.addEventListener("click", function () {
        generatedPassword = generatePassword();
        pwd.value = generatedPassword;
        pwd.type = "text";
        toggleVis.textContent = "非表示";
        toggleVis.setAttribute("aria-pressed", "true");
        btnCopy.disabled = false;
        btnSavePwd.disabled = false;
        genHint.textContent = "生成済み（16文字・英大文字・英小文字・数字・記号を含みます）";
        updateUI();
      });

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      function copyText(text) {
        if (!text) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            showToast("コピーしました");
          }).catch(function () {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      }

      btnCopy.addEventListener("click", function () {
        var text = pwd.value || generatedPassword;
        copyText(text);
      });

      function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          showToast("コピーしました");
        } catch (e) {
          showToast("コピーに失敗しました");
        }
        document.body.removeChild(ta);
      }

      buildChecks();
      btnCopy.disabled = pwd.value.length === 0;
      btnSavePwd.disabled = pwd.value.length === 0;
      updateUI();
      renderSavedList();
    })();
  </script>
</body>
</html>
